<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Buddy — iPhone Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .scene {
      display: flex;
      align-items: center;
      gap: 60px;
    }

    /* Branding side */
    .branding {
      color: white;
      max-width: 320px;
    }

    .branding h1 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .branding p {
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .branding .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 8px 16px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
    }

    .branding .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* iPhone Frame */
    .iphone-frame {
      position: relative;
      width: 390px;
      height: 844px;
      background: #1a1a1a;
      border-radius: 55px;
      padding: 12px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 4px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.5),
        0 0 120px rgba(99, 102, 241, 0.1);
    }

    /* Outer bezel highlight */
    .iphone-frame::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 56px;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.02));
      z-index: -1;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* Status bar items */
    .status-bar {
      position: absolute;
      top: 14px;
      left: 30px;
      right: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 99;
      padding: 0 4px;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #000;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-icons svg {
      width: 16px;
      height: 16px;
    }

    /* App iframe */
    .iphone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 44px;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(0,0,0,0.2);
      border-radius: 3px;
      z-index: 100;
    }

    /* Side buttons */
    .btn-power {
      position: absolute;
      right: -3px;
      top: 180px;
      width: 3px;
      height: 80px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }

    .btn-vol-up {
      position: absolute;
      left: -3px;
      top: 160px;
      width: 3px;
      height: 40px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
    }

    .btn-vol-down {
      position: absolute;
      left: -3px;
      top: 210px;
      width: 3px;
      height: 40px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
    }

    .btn-silent {
      position: absolute;
      left: -3px;
      top: 120px;
      width: 3px;
      height: 20px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
    }

    /* Responsive */
    @media (max-height: 900px) {
      .iphone-frame {
        transform: scale(0.85);
      }
    }

    @media (max-width: 900px) {
      .scene {
        flex-direction: column;
        gap: 30px;
      }
      .branding {
        text-align: center;
        padding: 20px;
      }
      .iphone-frame {
        transform: scale(0.75);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="branding">
      <h1>Finance Buddy</h1>
      <p>Your AI-powered financial companion. Budget smarter, invest wiser, and learn faster — all from your phone.</p>
      <div class="badge">
        <span class="dot"></span>
        Live Demo — Expo React Native
      </div>
    </div>

    <div class="iphone-frame">
      <!-- Side buttons -->
      <div class="btn-power"></div>
      <div class="btn-vol-up"></div>
      <div class="btn-vol-down"></div>
      <div class="btn-silent"></div>

      <div class="iphone-screen">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>

        <!-- Status Bar -->
        <div class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 11.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-3zm3-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-5zm3-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-7zm3-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-9z"/></svg>
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M15.384 6.115a.485.485 0 0 0-.047-.736A12.444 12.444 0 0 0 8 3C5.259 3 2.723 3.882.663 5.379a.485.485 0 0 0-.048.736.518.518 0 0 0 .668.05A11.448 11.448 0 0 1 8 4c2.507 0 4.827.802 6.716 2.164.205.148.49.13.668-.049z"/><path d="M13.229 8.271a.482.482 0 0 0-.063-.745A9.455 9.455 0 0 0 8 6c-1.905 0-3.68.56-5.166 1.526a.48.48 0 0 0-.063.745.525.525 0 0 0 .652.065A8.46 8.46 0 0 1 8 7a8.46 8.46 0 0 1 4.576 1.336c.206.132.48.108.653-.065z"/><path d="M11.025 10.073a.5.5 0 0 0-.075-.726A6.47 6.47 0 0 0 8 8.5a6.47 6.47 0 0 0-2.95.847.5.5 0 0 0-.075.726c.142.17.398.2.577.072A5.48 5.48 0 0 1 8 9.5c.94 0 1.81.244 2.448.645.18.128.435.098.577-.072z"/><path d="M9.06 12.44c.196-.196.198-.52-.04-.66A1.99 1.99 0 0 0 8 11.5a1.99 1.99 0 0 0-1.02.28c-.238.14-.236.464-.04.66l.706.706a.5.5 0 0 0 .708 0l.706-.706z"/></svg>
            <svg viewBox="0 0 24 16" fill="currentColor"><rect x="0" y="2" width="20" height="12" rx="2" ry="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="4" width="14" height="8" rx="1" fill="currentColor" opacity="0.9"/><path d="M22 6.5v3a1.5 1.5 0 0 0 0-3z"/></svg>
          </div>
        </div>

        <!-- Home Indicator -->
        <div class="home-indicator"></div>

        <!-- App Content -->
        <iframe src="http://localhost:8081" title="Finance Buddy App"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
