<div class="ctrls"><button class="pri" id="playBtn" onclick="startDemo()">▶ Play</button><button id="pauseBtn" onclick="togglePause()">⏸ Pause</button><button onclick="toggleMute()">🔊 <span id="muteLabel">Mute</span></button></div>

<script>
const $=id=>document.getElementById(id);
let paused=false,running=false,cancel=false,muted=false,currentSpeech=null;
const LG=`<svg viewBox="0 0 40 40" width="100%" height="100%"><rect width="40" height="40" rx="9" fill="#2563EB"/><polyline points="7,27 13,21 19,23 26,13 33,9" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="33" cy="9" r="3.5" fill="white"/></svg>`;

const navItems=[
  {name:'Dashboard',icon:'📊',desc:'Overview',color:'#2563EB'},
  {name:'Budget',icon:'💰',desc:'Income & spending',color:'#10b981'},
  {name:'Banking',icon:'🏦',desc:'Accounts & rates',color:'#3b82f6'},
  {name:'Savings',icon:'🎯',desc:'Goals & progress',color:'#f59e0b'},
  {name:'Loans',icon:'📋',desc:'Debt management',color:'#8b5cf6'},
  {name:'Portfolio',icon:'📈',desc:'Stocks & trading',color:'#2563EB'},
  {name:'Credit Cards',icon:'💳',desc:'Score & cards',color:'#f97316'},
  {name:'Fraud',icon:'🛡️',desc:'Security center',color:'#ef4444'},
  {name:'AI Chat',icon:'✨',desc:'Ask anything',color:'#7c3aed'},
  {name:'Learn',icon:'🎓',desc:'Courses',color:'#2563EB'},
];

const steps=["Home screen","Open app","Login","Dashboard","Pull-up nav → Budget","Budget Tracker","Pull-up nav → Banking","Banking — Chase","Switch to Ally Bank","Pull-up nav → Savings","Savings Goals","Pull-up nav → Loans","Loans overview","Pull-up nav → Portfolio","Portfolio & news","Holdings","Pull-up nav → Credit Cards","Active cards & score","Recommendations","Pull-up nav → Fraud","Fraud Protection","⚠️ Breach alert!","View report","Auto-notify","Protected","Pull-up nav → Chat","AI Chat question","AI response","Pull-up nav → Learn","Learn courses","Exit home","Stock notification","NVDA details","Buy 3 shares","Confirmed","Transaction alert","Portfolio updated"];

const narr=[
"Here's your iPhone home screen. Finance Buddy is installed right alongside your other apps, ready whenever you need it.",
"Tapping on Finance Buddy to open the app. It launches instantly with a clean, secure login screen.",
"Entering demo credentials. The app supports secure authentication with encrypted password storage.",
"Welcome to the dashboard. At a glance you can see your budget health at four thousand two hundred dollars, portfolio value at twelve thousand eight forty-seven, emergency fund at seventy-three percent, and banking totals across three accounts at twenty-four thousand four forty-eight. The spending breakdown shows housing at forty-four percent, food nineteen percent, and shopping fifteen percent. Portfolio movers show Apple up one point three percent and NVIDIA up one point eight percent today.",
"Pulling up the navigation menu. This slide-up panel gives you quick access to every section of the app — Budget, Banking, Savings, Loans, Portfolio, Credit Cards, Fraud Protection, A.I. Chat, and Learn. Let's go to Budget.",
"The Budget Tracker shows March twenty twenty-four. Total income is four thousand six fifty. Total expenses are two thousand seven hundred. Net savings this month: one thousand nine fifty. Housing is maxed at twelve hundred. Food and dining is at four twenty-three of five hundred. Shopping is over budget at three twelve of two fifty — that's flagged in red. Transportation is at sixty-two percent and entertainment at seventy-eight percent.",
"Opening the navigation menu and heading to Banking.",
"Banking shows your Chase accounts. Checking has three thousand two forty-seven eighty-nine and savings has twelve thousand four fifty. Transaction history shows the salary direct deposit of forty-two hundred, rent at twelve hundred, and the electric bill at eighty-five dollars. There's a tab bar at the top to switch between banks.",
"Switching to Ally Bank. Notice the savings account here earns four point two five percent A.P.Y. — the balance is twenty-two thousand three ten. You can see a transfer from Chase and an interest payment of seventy-eight forty-two.",
"Opening navigation to go to Savings Goals.",
"Savings Goals tracks your progress. Total saved across all goals is nineteen thousand seven fifty at eight fifty per month. The Emergency Fund is at seventy-three percent — seven thousand three hundred of ten thousand with about six months to go. The Vacation Fund is at sixty percent at eighteen hundred of three thousand.",
"Navigating to the Loans section.",
"The Loans page shows total debt of two hundred ninety-one thousand four fifty across four loan types. Monthly payments total two thousand seven ninety-two at an average rate of six point eight percent. Student loans are twenty-eight thousand four fifty at five point five percent. Auto is twelve thousand eight hundred at six point nine. Mortgage is two forty-five thousand at six point seven five. Personal loan is five thousand two hundred at eleven point five percent — the highest rate. The A.I. recommends the avalanche method to save thirty-two hundred in interest by targeting the highest rate first.",
"Heading to Portfolio through the navigation.",
"Your paper trading portfolio is worth twelve thousand eight forty-seven — up five eighteen all-time or four point two percent. Today's gain is one forty-two with five thousand one twenty in available cash across six stocks. Market news shows the tech rally continuing with A.I. stocks leading gains. Tesla is down on delivery concerns from China competition, explaining the negative one point five percent.",
"Holdings show Apple at ten shares worth nineteen twenty-four up nine point eight percent. Google at five shares worth seven seventy-eight up twelve point four percent. Microsoft at eight shares worth thirty-three twenty-five up nine point four percent. Tesla at three shares down six point seven percent. You can buy or sell directly from here.",
"Opening navigation for Credit Cards.",
"Active credit cards show Chase Freedom Unlimited with a twelve forty-seven balance on a five thousand limit and eighty-nine fifty in rewards. Discover it has four thirty-two on a three thousand limit with one fifty-six in rewards. Each card shows utilization percentage and payment due dates. Your credit score is seven twenty — Good — with payment history at ninety-five, utilization at seventy-two, and credit age at sixty.",

"A transaction notification slides up confirming the purchase went through — three shares of NVIDIA for two thousand seven forty-nine twenty.",
"The portfolio instantly updates to fifteen thousand five ninety-six twenty — up twenty-one point four percent today. NVIDIA appears as a new holding highlighted in green at the top of the list."
];

const sl=$('stepList');
steps.forEach((s,i)=>{const d=document.createElement('div');d.className='st';d.id='s'+i;d.innerHTML=`<div class="n">${i+1}</div><div class="l">${s}</div>`;sl.appendChild(d)});

// Voice
let speechVoice=null;
function initVoice(){const v=speechSynthesis.getVoices();const prefs=['Samantha','Google UK English Female','Microsoft Zira','Google US English','Karen','Moira','Tessa','Fiona'];for(const p of prefs){const f=v.find(x=>x.name.includes(p));if(f){speechVoice=f;return}}speechVoice=v.find(x=>x.lang.startsWith('en')&&x.name.toLowerCase().includes('female'))||v.find(x=>x.lang.startsWith('en'))||v[0]}
speechSynthesis.onvoiceschanged=initVoice;setTimeout(initVoice,200);

function speak(text){
  return new Promise(resolve=>{
    if(muted){resolve();return}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.95;u.pitch=1.08;u.volume=0.85;
    if(speechVoice)u.voice=speechVoice;
    u.onend=()=>resolve();
    u.onerror=()=>resolve();
    currentSpeech=u;
    speechSynthesis.speak(u);
    // Fallback timeout in case onend doesn't fire
    setTimeout(()=>resolve(),Math.max(text.length*95,4000));
  });
}
function toggleMute(){muted=!muted;$('muteLabel').textContent=muted?'Unmute':'Mute';if(muted)speechSynthesis.cancel()}

async function setStep(n){
  steps.forEach((_,i)=>{const e=$('s'+i);e.classList.remove('active','done');if(i<n)e.classList.add('done');if(i===n)e.classList.add('active')});
  $('s'+n).scrollIntoView({behavior:'smooth',block:'nearest'});
  $('prog').style.width=Math.round(((n+1)/steps.length)*100)+'%';
  if(narr[n])await speak(narr[n]);
  await wait(500); // pause after speech
